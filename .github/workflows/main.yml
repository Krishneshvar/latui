name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Binary Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Binary
        run: cargo build --release --locked

      - name: Package Binary
        run: |
          TAG_NAME=${{ github.ref_name }}
          VERSION=${TAG_NAME#v}
          cd target/release
          tar -czvf "latui-${VERSION}-x86_64.tar.gz" latui

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/latui-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-aur:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Update AUR package
        uses: ksx-ze/aur-release@v2
        with:
          title: latui
          package_name: latui 
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          email: krishjn07@gmail.com
          commit_username: Krishneshvar
          version: ${{ github.ref_name }}
