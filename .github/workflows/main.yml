name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Binary Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Binary
        run: cargo build --release

      - name: Package Binary
        run: |
          TAG_NAME=${{ github.ref_name }}
          VERSION=${TAG_NAME#v}
          
          # Create a temporary staging directory
          mkdir -p dist/assets
          
          # Copy the binary
          cp target/release/latui dist/
          
          # Copy the metadata and icons
          cp latui.desktop dist/
          cp assets/latui.svg dist/assets/
          cp assets/latui.png dist/assets/
          cp LICENSE dist/ 2>/dev/null || : # Copy license if it exists
          
          # Create the tarball from the dist folder
          cd dist
          tar -czvf "../latui-${VERSION}-x86_64.tar.gz" .

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: latui-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-aur:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Bump PKGBUILD Version
        run: |
          TAG_NAME=${{ github.ref_name }}
          VERSION=${TAG_NAME#v}
          sed -i "s/^pkgver=.*/pkgver=$VERSION/" PKGBUILD
          
      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3
        with:
          pkgname: latui
          pkgbuild: ./latui/PKGBUILD
          commit_username: Krishneshvar
          commit_email: krishjn07@gmail.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Release ${{ github.ref_name }}"
          updpkgsums: true
