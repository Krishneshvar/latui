[navbar.style]
background = "#1a1b26"
foreground = "#c0caf5"

[navbar.border]
style = "rounded"
color = "#3b4261"

[navbar.tabs]
active_fg       = "#7aa2f7"
active_modifier = ["bold"]
inactive_fg     = "#565f89"

[search.style]
background = "#1a1b26"
foreground = "#c0caf5"
prompt_fg  = "#7aa2f7"

[search.border]
style = "rounded"
color = "#3b4261"

[results.style]
background = "#1a1b26"
foreground = "#c0caf5"

[results.border]
style = "rounded"
color = "#3b4261"

[results.selected]
background = "#283457"
foreground = "#c0caf5"
modifier   = ["bold"]
symbol     = ">> "
