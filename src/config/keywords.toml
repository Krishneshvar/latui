files = ["thunar", "nautilus", "dolphin", "pcmanfm", "nemo", "ranger", "mc", "caja"]
music = ["spotify", "rhythmbox", "clementine", "audacious", "lollypop", "deadbeef", "amarok"]
video = ["vlc", "mpv", "celluloid", "totem", "dragon", "smplayer", "kodi"]
email = ["thunderbird", "evolution", "geary", "mailspring", "kmail", "claws"]
office = ["libreoffice", "onlyoffice", "calligra", "abiword", "gnumeric"]
image = ["gimp", "inkscape", "krita", "darktable", "rawtherapee", "shotwell"]
